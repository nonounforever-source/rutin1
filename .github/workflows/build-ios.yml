name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:  # يتيح تشغيل يدوي من GitHub

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── 1. سحب الكود ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. إعداد Node.js ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. تثبيت التبعيات ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. بناء Vite ──────────────────────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ── 5. تثبيت Capacitor CLI ────────────────────────────────────────────
      - name: Install Capacitor CLI
        run: npm install --save-dev @capacitor/cli @capacitor/core @capacitor/ios @capacitor/splash-screen

      # ── 6. إضافة منصة iOS ─────────────────────────────────────────────────
      - name: Add iOS platform
        run: npx cap add ios

      # ── 7. رفع الحد الأدنى لـ iOS إلى 14.0 ───────────────────────────────
      - name: Set iOS deployment target to 14.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' \
            ios/App/App.xcodeproj/project.pbxproj
          cd ios/App && pod install --repo-update

      # ── 8. مزامنة الملفات مع iOS ──────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync ios

      # ── 9. اختيار إصدار Xcode ─────────────────────────────────────────────
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # ── 10. بناء التطبيق بدون توقيع (AltStore يوقّعه لاحقاً) ──────────────
      - name: Build iOS app (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build/Release-iphoneos \
            2>&1

      # ── 11. تحزيم ملف .app كـ IPA ─────────────────────────────────────────
      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/App.app Payload/App.app
          zip -r Routines.ipa Payload
          echo "✅ تم إنشاء ملف Routines.ipa بنجاح"

      # ── 12. رفع IPA كـ Artifact ────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Routines-IPA
          path: Routines.ipa
          retention-days: 30
          if-no-files-found: error

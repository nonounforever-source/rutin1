name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install Capacitor CLI
        run: npm install --save-dev @capacitor/cli @capacitor/core @capacitor/ios @capacitor/splash-screen

      - name: Add iOS platform (ignore pod error)
        run: npx cap add ios || true

      - name: Fix Podfile deployment target to iOS 16
        run: |
          sed -i '' "s/platform :ios, '[^']*'/platform :ios, '16.0'/" ios/App/Podfile
          head -5 ios/App/Podfile

      - name: Pod install
        run: cd ios/App && pod install --repo-update

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build iOS app (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_VERSION=5 \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build/Release-iphoneos \
            2>&1 | tee build_output.txt | grep -E "^(error:|warning: |✓|❌|Build succeeded|Build FAILED|CompileSwift)" || true
          # اطبع الأخطاء فقط إذا فشل البناء
          if grep -q "Build FAILED" build_output.txt; then
            echo "=== ERRORS ==="
            grep "error:" build_output.txt | head -30
            exit 1
          fi

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/App.app Payload/App.app
          zip -r Routines.ipa Payload
          echo "✅ تم إنشاء ملف Routines.ipa بنجاح"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Routines-IPA
          path: Routines.ipa
          retention-days: 30
          if-no-files-found: error

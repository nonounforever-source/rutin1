name: 🔨 Build IPA for AltStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Node.js ────────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── 3. Install dependencies ───────────────────────────────────────────
      - name: 📦 Install dependencies
        working-directory: app_ios
        run: npm ci

      # ─── 4. Build web app ──────────────────────────────────────────────────
      - name: 🔨 Build web app
        working-directory: app_ios
        run: npm run build

      # ─── 5. Capacitor iOS ─────────────────────────────────────────────────
      - name: 📱 Add iOS platform
        working-directory: app_ios
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: 🔄 Sync Capacitor
        working-directory: app_ios
        run: npx cap sync ios

      # ─── 6. CocoaPods ─────────────────────────────────────────────────────
      - name: 🦪 Install CocoaPods
        working-directory: app_ios/ios/App
        run: pod install --repo-update

      # ─── 7. Build بدون توقيع ──────────────────────────────────────────────
      - name: 🏗️ Archive app (no signing)
        working-directory: app_ios
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty

      # ─── 8. Package IPA ───────────────────────────────────────────────────
      - name: 📦 Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r "$RUNNER_TEMP/Routinely.ipa" Payload/

      # ─── 9. Upload Artifact ───────────────────────────────────────────────
      - name: ⬆️ Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Routinely-IPA
          path: ${{ runner.temp }}/Routinely.ipa
          retention-days: 30

      - name: ✅ Done
        if: success()
        run: echo "🎉 الـ IPA جاهز! حمّله من Actions → Artifacts"
